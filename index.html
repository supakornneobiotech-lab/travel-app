<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกการเดินทาง</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f5f6fa; color: #222; font-size: 14px; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
h1 { font-size: 22px; font-weight: 600; margin-bottom: 20px; color: #1a1a2e; }
h3 { font-size: 13px; font-weight: 600; color: #666; margin-bottom: 10px; text-transform: uppercase; letter-spacing: .5px; }
.card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; padding: 16px 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; color: #888; font-weight: 500; }
.field input, .field select { height: 38px; padding: 0 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; font-family: inherit; color: #222; background: #fafafa; }
.field input:focus, .field select:focus { outline: none; border-color: #4f6ef7; background: #fff; }
button { height: 38px; padding: 0 16px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-size: 13px; font-family: inherit; cursor: pointer; color: #333; transition: all .15s; }
button:hover { background: #f0f0f0; }
button.primary { background: #4f6ef7; color: #fff; border-color: #4f6ef7; font-weight: 500; }
button.primary:hover { background: #3a58e0; }
button.sm { height: 30px; padding: 0 10px; font-size: 12px; }
button.danger { color: #e74c3c; border-color: #f5c6c6; }
button.danger:hover { background: #fff5f5; }
button:disabled { opacity: .4; cursor: not-allowed; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: #f8f9fc; padding: 9px 10px; text-align: left; font-weight: 600; border-bottom: 2px solid #eee; color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; }
tbody td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
tbody tr:hover td { background: #f9f9ff; }
.num { text-align: right; }
.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
.metric { background: #fff; border-radius: 10px; padding: 12px 16px; border: 1px solid #e8e8e8; }
.metric .lbl { font-size: 11px; color: #999; margin-bottom: 4px; }
.metric .val { font-size: 22px; font-weight: 600; color: #1a1a2e; }
.metric.total { background: #4f6ef7; border-color: #4f6ef7; }
.metric.total .lbl { color: rgba(255,255,255,.7); }
.metric.total .val { color: #fff; }
.tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 99px; background: #e8f5e9; color: #2e7d32; margin-left: 4px; font-weight: 500; }
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: #4f6ef7; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.dot.ok { background: #4caf50; }
.dot.err { background: #e74c3c; }
#key-status { font-size: 12px; color: #888; margin-top: 6px; }
.status-ok { color: #2e7d32; }
.status-err { color: #c62828; }
.export-row { display: flex; gap: 8px; flex-wrap: wrap; }
.sep { margin: 8px 0; border: none; border-top: 1px solid #f0f0f0; }
.map-thumb { width: 120px; height: 80px; border-radius: 6px; border: 1px solid #ddd; object-fit: cover; cursor: pointer; }
.map-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.7); z-index:1000; align-items:center; justify-content:center; }
.map-modal.open { display:flex; }
.map-modal-inner { background:#fff; border-radius:12px; padding:16px; width:90%; max-width:700px; }
.map-modal-inner h4 { margin-bottom:10px; font-size:15px; }
#modal-map { width:100%; height:400px; border-radius:8px; }
</style>
</head>
<body>
<div class="container">
  <h1>บันทึกการเดินทาง</h1>

  <div class="card">
    <h3>Google Maps API Key</h3>
    <div class="row">
      <div class="field" style="flex:1;max-width:420px">
        <label>API Key</label>
        <input type="password" id="apikey" placeholder="วาง API Key ที่นี่...">
      </div>
      <button class="primary" onclick="saveKey()">โหลด Maps</button>
    </div>
    <div id="key-status">ยังไม่ได้ใส่ Key</div>
  </div>

  <div class="card">
    <h3>ข้อมูลทั่วไป</h3>
    <div class="row">
      <div class="field"><label>เดือน</label><input type="month" id="month" style="width:140px"></div>
      <div class="field"><label>ชื่อพนักงาน</label><input type="text" id="emp" placeholder="ชื่อ-นามสกุล" style="width:170px"></div>
      <div class="field"><label>แผนก</label><input type="text" id="dept" placeholder="แผนก" style="width:130px"></div>
      <div class="field"><label>อัตราน้ำมัน (บ/กม.)</label>
        <select id="rate-default" style="width:75px"><option value="5">5</option><option value="6">6</option></select>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>เพิ่มรายการเดินทาง</h3>
    <div class="row" style="margin-bottom:12px">
      <div class="field"><label>วันที่</label><input type="date" id="in-date" style="width:135px"></div>
      <div class="field"><label>วัตถุประสงค์</label><input type="text" id="in-purpose" placeholder="เช่น TPA" style="width:130px"></div>
      <div class="field"><label>ต้นทาง</label><input type="text" id="in-from" placeholder="เช่น สีลม กรุงเทพ" style="width:185px"></div>
      <div class="field"><label>ปลายทาง</label><input type="text" id="in-to" placeholder="เช่น Valia Hotel Bangkok" style="width:185px"></div>
    </div>
    <div class="row">
      <button class="primary" id="btn-add" onclick="addRow()">+ เพิ่มรายการ</button>
      <span id="fetch-status" style="font-size:12px;color:#666"></span>
    </div>
  </div>

  <div class="card" style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>#</th><th>วันที่</th><th>วัตถุประสงค์</th><th>เส้นทาง</th>
        <th class="num">ระยะทาง (กม.)</th><th class="num">อัตรา</th>
        <th class="num">ค่าใช้จ่าย (฿)</th><th>ลิงก์ Maps</th><th>รูป MAP</th><th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <hr class="sep">
    <div class="row" style="margin-top:10px">
      <div class="field"><label>ค่าทางด่วน (฿)</label><input type="number" id="toll" placeholder="0" min="0" style="width:110px" oninput="updateSummary()"></div>
      <div class="field"><label>ค่าจอดรถ (฿)</label><input type="number" id="parking" placeholder="0" min="0" style="width:110px" oninput="updateSummary()"></div>
      <div class="field"><label>ค่าอื่นๆ (฿)</label><input type="number" id="other" placeholder="0" min="0" style="width:110px" oninput="updateSummary()"></div>
    </div>
  </div>

  <div class="summary">
    <div class="metric"><div class="lbl">รวมระยะทาง</div><div class="val" id="s-km">0.0 กม.</div></div>
    <div class="metric"><div class="lbl">ค่าน้ำมัน</div><div class="val" id="s-fuel">฿0</div></div>
    <div class="metric"><div class="lbl">ค่าอื่นๆ</div><div class="val" id="s-extra">฿0</div></div>
    <div class="metric total"><div class="lbl">รวมทั้งหมด</div><div class="val" id="s-total">฿0</div></div>
  </div>

  <div class="export-row">
    <button class="primary" onclick="exportExcel()">📊 Export Excel</button>
    <button class="primary" onclick="exportDoc()">📄 Export MAP.docx</button>
    <button onclick="clearAll()">ล้างข้อมูล</button>
  </div>
</div>

<!-- Map Modal -->
<div class="map-modal" id="map-modal">
  <div class="map-modal-inner">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h4 id="modal-title">แผนที่เส้นทาง</h4>
      <button onclick="closeModal()" style="height:30px;padding:0 12px">ปิด</button>
    </div>
    <div id="modal-map"></div>
  </div>
</div>

<!-- Hidden canvas for map capture -->
<canvas id="capture-canvas" style="display:none"></canvas>

<script>
let rows = [];
let apiKey = '';
let mapsReady = false;
let modalMap = null;
let modalRenderer = null;

function saveKey() {
  const v = document.getElementById('apikey').value.trim();
  if (!v) return;
  apiKey = v;
  const s = document.getElementById('key-status');
  s.innerHTML = '<span class="spin"></span> กำลังโหลด Google Maps...';
  const old = document.getElementById('gmap-script');
  if (old) old.remove();
  mapsReady = false;
  window.initGoogleMaps = function() {
    mapsReady = true;
    s.innerHTML = '<span class="dot ok"></span><span class="status-ok">พร้อมใช้งาน</span>';
  };
  const script = document.createElement('script');
  script.id = 'gmap-script';
  script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=initGoogleMaps&language=th&region=TH`;
  script.async = true;
  script.onerror = () => {
    s.innerHTML = '<span class="dot err"></span><span class="status-err">โหลดไม่สำเร็จ — ตรวจสอบ API Key</span>';
  };
  document.head.appendChild(script);
}

function fmt(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function geocode(address) {
  return new Promise((resolve, reject) => {
    new google.maps.Geocoder().geocode({ address, region: 'TH' }, (results, status) => {
      if (status === 'OK') resolve(results[0].geometry.location);
      else reject(new Error(`Geocode failed: ${address}`));
    });
  });
}


async function calcRouteAPI(originAddr, destAddr, waypointLatLng) {
  const body = {
    origin: { address: originAddr },
    destination: { address: destAddr },
    travelMode: 'DRIVE',
    computeAlternativeRoutes: waypointLatLng ? false : true,
    languageCode: 'th',
    regionCode: 'TH'
  };
  if (waypointLatLng) {
    body.intermediates = [{ location: { latLng: { latitude: waypointLatLng.lat(), longitude: waypointLatLng.lng() } } }];
  }
  const res = await fetch('https://routes.googleapis.com/directions/v2:computeRoutes', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Goog-Api-Key': apiKey,
      'X-Goog-FieldMask': 'routes.distanceMeters,routes.polyline,routes.legs'
    },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!data.routes || data.routes.length === 0) throw new Error(data.error?.message || 'ไม่พบเส้นทาง');
  // เลือก route ที่ไกลสุด
  const longest = data.routes.reduce((a, b) => a.distanceMeters > b.distanceMeters ? a : b);
  const distKm = Math.round(longest.distanceMeters / 100) / 10;
  return { distKm, polyline: longest.polyline?.encodedPolyline || '' };
}

async function fetchRouteWithDetour(fromAddr, toAddr) {
  // ดึงเส้นทางทั้งหมดแล้วเลือกไกลสุด
  const longest = await calcRouteAPI(fromAddr, toAddr, null);
  // บวกเพิ่ม 2 กม. สำหรับระยะอ้อม
  const distKm = parseFloat((longest.distKm + 2).toFixed(1));
  const dirResult = await getDirectionsForMap(fromAddr, toAddr);
  return { distKm, polyline: longest.polyline || '', dirResult };
}

// หา midpoint แล้วเบี่ยงออก ~1 กม. เพื่อให้ได้เส้นทางยาวขึ้น ~2 กม.
function getWaypoint(fromLatLng, toLatLng) {
  const midLat = (fromLatLng.lat() + toLatLng.lat()) / 2;
  const midLng = (fromLatLng.lng() + toLatLng.lng()) / 2;
  const dLat = toLatLng.lat() - fromLatLng.lat();
  const dLng = toLatLng.lng() - fromLatLng.lng();
  const len = Math.sqrt(dLat * dLat + dLng * dLng) || 1;
  const offset = 0.009; // ~1 กม. ได้ระยะเพิ่ม ~2 กม.
  return new google.maps.LatLng(midLat + (-dLng / len) * offset, midLng + (dLat / len) * offset);
}

function getDirectionsForMap(origin, destination) {
  return new Promise((resolve) => {
    const svc = new google.maps.DirectionsService();
    svc.route({ origin, destination, travelMode: google.maps.TravelMode.DRIVING, region: 'TH' },
      (result, status) => { resolve(status === 'OK' ? result : null); }
    );
  });
}

async function addRow() {
  if (!apiKey) { alert('กรุณาใส่ API Key ก่อนค่ะ'); return; }
  if (!mapsReady) { alert('Google Maps ยังโหลดไม่เสร็จ กรุณารอสักครู่'); return; }
  const date = document.getElementById('in-date').value;
  const purpose = document.getElementById('in-purpose').value.trim();
  const from = document.getElementById('in-from').value.trim();
  const to = document.getElementById('in-to').value.trim();
  if (!date || !from || !to) { alert('กรุณากรอกวันที่ ต้นทาง และปลายทาง'); return; }

  const btn = document.getElementById('btn-add');
  const status = document.getElementById('fetch-status');
  btn.disabled = true;
  status.innerHTML = '<span class="spin"></span> กำลังคำนวณเส้นทาง...';

  try {
    const { distKm, polyline, dirResult } = await fetchRouteWithDetour(from, to);
    const rate = parseFloat(document.getElementById('rate-default').value);
    const mapImgGo = captureStaticMap(polyline, from, to);
    rows.push({ date, purpose, from, to, km: distKm, rate, mapImgGo, dirResult });
    ['in-date','in-purpose','in-from','in-to'].forEach(id => document.getElementById(id).value = '');
    status.innerHTML = `✓ ${distKm} กม.`;
    renderTable();
  } catch (e) {
    status.innerHTML = `<span style="color:#e74c3c">ผิดพลาด: ${e.message}</span>`;
  }
  btn.disabled = false;
}

function captureStaticMap(polyline, from, to) {
  try {
    const origin = encodeURIComponent(from);
    const dest = encodeURIComponent(to);
    const base = `https://maps.googleapis.com/maps/api/staticmap?size=600x400&maptype=roadmap&markers=color:green|label:A|${origin}&markers=color:red|label:B|${dest}&key=${apiKey}`;
    if (polyline && polyline.length > 0) {
      return base + `&path=enc:${encodeURIComponent(polyline)}`;
    }
    return base + `&path=color:0x0000ffff|weight:3|${origin}|${dest}`;
  } catch(e) { return null; }
}

function showMap(i) {
  const r = rows[i];
  if (!r.dirResult || !mapsReady) return;
  document.getElementById('modal-title').textContent = `${r.purpose || r.to} — ${r.from} → ${r.to} (${r.oneWay} กม.)`;
  document.getElementById('map-modal').classList.add('open');
  setTimeout(() => {
    const mapDiv = document.getElementById('modal-map');
    const map = new google.maps.Map(mapDiv, { zoom: 10, center: { lat: 13.7563, lng: 100.5018 } });
    const renderer = new google.maps.DirectionsRenderer();
    renderer.setMap(map);
    renderer.setDirections(r.dirResult);
    modalMap = map;
    modalRenderer = renderer;
  }, 100);
}

function closeModal() {
  document.getElementById('map-modal').classList.remove('open');
}

function uploadUserImg(i, file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { rows[i].userImg = e.target.result; renderTable(); };
  reader.readAsDataURL(file);
}

function removeUserImg(i) { rows[i].userImg = null; renderTable(); }

function removeRow(i) { rows.splice(i, 1); renderTable(); }

function renderTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach((r, i) => {
    const amt = r.km * r.rate;
    const mapsUrl = `https://www.google.com/maps/dir/${encodeURIComponent(r.from)}/${encodeURIComponent(r.to)}`;
    const tr = document.createElement('tr');
    // thumbnail หรือช่องอัปโหลด
    let imgCell = '';
    if (r.userImg) {
      imgCell = `<div style="display:flex;gap:4px;align-items:center">
        <img src="${r.userImg}" class="map-thumb">
        <button class="danger sm" onclick="removeUserImg(${i})">ลบรูป</button>
      </div>`;
    } else {
      imgCell = `<label style="display:flex;flex-direction:column;align-items:center;gap:3px;width:80px;height:55px;border:1.5px dashed #ccc;border-radius:6px;cursor:pointer;font-size:10px;color:#aaa;justify-content:center">
        <span style="font-size:18px">+</span><span>ใส่รูป</span>
        <input type="file" accept="image/*" style="display:none" onchange="uploadUserImg(${i},this.files[0])">
      </label>`;
    }
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td style="white-space:nowrap">${fmt(r.date)}</td>
      <td>${r.purpose}</td>
      <td style="font-size:12px;color:#888">${r.from} → ${r.to}</td>
      <td class="num"><strong>${r.km.toFixed(1)}</strong><span class="tag">ไกลสุด</span></td>
      <td class="num">${r.rate}</td>
      <td class="num"><strong>${amt.toFixed(0)}</strong></td>
      <td><a href="${mapsUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;height:28px;padding:0 10px;background:#1a73e8;color:#fff;border-radius:6px;font-size:11px;text-decoration:none;white-space:nowrap">🗺 เปิด Maps</a></td>
      <td>${imgCell}</td>
      <td><button class="danger sm" onclick="removeRow(${i})">ลบ</button></td>
    `;
    tbody.appendChild(tr);
  });
  updateSummary();
}

function updateSummary() {
  const totalKm = rows.reduce((s, r) => s + r.km, 0);
  const fuelAmt = rows.reduce((s, r) => s + r.km * r.rate, 0);
  const toll = parseFloat(document.getElementById('toll').value) || 0;
  const parking = parseFloat(document.getElementById('parking').value) || 0;
  const other = parseFloat(document.getElementById('other').value) || 0;
  const extra = toll + parking + other;
  document.getElementById('s-km').textContent = totalKm.toFixed(1) + ' กม.';
  document.getElementById('s-fuel').textContent = '฿' + fuelAmt.toFixed(0);
  document.getElementById('s-extra').textContent = '฿' + extra.toFixed(0);
  document.getElementById('s-total').textContent = '฿' + (fuelAmt + extra).toFixed(0);
}

function clearAll() {
  if (!confirm('ล้างข้อมูลทั้งหมด?')) return;
  rows = [];
  ['toll','parking','other'].forEach(id => document.getElementById(id).value = '');
  renderTable();
}

function getMonthName(mo) {
  return ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'][parseInt(mo) - 1];
}

function getMonthNameEng(mo) {
  return ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][parseInt(mo) - 1];
}

function exportExcel() {
  const [yr, mo] = document.getElementById('month').value.split('-');
  const toll = parseFloat(document.getElementById('toll').value) || 0;
  const parking = parseFloat(document.getElementById('parking').value) || 0;
  const other = parseFloat(document.getElementById('other').value) || 0;
  const mNameEng = getMonthNameEng(mo);
  const wb = XLSX.utils.book_new();
  const dataRows = [];
  dataRows.push([`Travelling Expense in ${mNameEng} ${yr}`]);
  dataRows.push(['Date', 'Purpose', 'Venue', 'Distance', 'Fee', 'Amount']);
  rows.forEach((r, i) => {
    const excelRow = i + 3;
    dataRows.push([fmt(r.date), r.purpose, r.to, r.km, r.rate, `=D${excelRow}*E${excelRow}`]);
  });
  dataRows.push([null, 'Toll Fee', null, null, null, toll > 0 ? toll : null]);
  dataRows.push([null, 'Car Parking', null, null, null, parking > 0 ? parking : null]);
  if (other > 0) dataRows.push([null, 'Other', null, null, null, other]);
  const totalRow = dataRows.length + 1;
  dataRows.push(['Total', null, null, null, null, `=SUM(F3:F${totalRow - 1})`]);
  const ws = XLSX.utils.aoa_to_sheet(dataRows);
  ws['!cols'] = [{wch:14},{wch:24},{wch:26},{wch:12},{wch:8},{wch:12}];
  ws['!merges'] = [{s:{r:0,c:0}, e:{r:0,c:5}}];
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb, `Travelling_${mNameEng}_${yr}.xlsx`);
}

async function exportDoc() {
  if (rows.length === 0) { alert('ยังไม่มีรายการเดินทาง'); return; }
  if (typeof docx === 'undefined') {
    try {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/docx@8.2.2/build/index.umd.js';
        s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    } catch(e) { alert('โหลด library ไม่สำเร็จ'); return; }
  }

  const [yr, mo] = document.getElementById('month').value.split('-');
  const mName = getMonthName(mo);
  const { Document, Packer, Paragraph, TextRun, ImageRun, AlignmentType, PageBreak } = docx;
  const children = [];

  children.push(new Paragraph({
    children: [new TextRun({ text: `MAP หลักฐานการเดินทาง — ${mName} ${yr}`, bold: true, size: 32 })],
    alignment: AlignmentType.CENTER, spacing: { after: 400 }
  }));

  // จัดกลุ่มตามวันที่
  const grouped = {};
  rows.forEach(r => {
    if (!grouped[r.date]) grouped[r.date] = [];
    grouped[r.date].push(r);
  });

  const dates = Object.keys(grouped).sort();
  for (let di = 0; di < dates.length; di++) {
    const date = dates[di];
    const dayRows = grouped[date];
    if (di > 0) children.push(new Paragraph({ children: [new PageBreak()] }));

    // หัววัน
    children.push(new Paragraph({
      children: [new TextRun({ text: fmt(date), bold: true, size: 26 })],
      spacing: { after: 120 }
    }));

    for (const r of dayRows) {
      children.push(new Paragraph({
        children: [new TextRun({ text: `${r.purpose || r.to}   |   ${r.from} → ${r.to}   |   ${r.km.toFixed(1)} กม.`, size: 20, color: '555555' })],
        spacing: { after: 120 }
      }));
      if (r.userImg) {
        try {
          const base64 = r.userImg.split(',')[1];
          const binary = atob(base64);
          const bytes = new Uint8Array(binary.length);
          for (let j = 0; j < binary.length; j++) bytes[j] = binary.charCodeAt(j);
          const imgType = r.userImg.includes('image/png') ? 'png' : 'jpg';
          children.push(new Paragraph({ children: [new ImageRun({ data: bytes.buffer, transformation: { width: 460, height: 280 }, type: imgType })], spacing: { after: 160 } }));
        } catch(e) {
          children.push(new Paragraph({ children: [new TextRun({ text: `[แผนที่: ${r.from} → ${r.to}]`, size: 20, color: '999999', italics: true })] }));
        }
      } else {
        children.push(new Paragraph({ children: [new TextRun({ text: '[ ยังไม่มีรูป — กด เปิด Maps แล้ว screenshot ใส่ ]', size: 20, color: '999999', italics: true })], spacing: { after: 160 } }));
      }
    }
  }

  const doc = new Document({ sections: [{ children }] });
  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `MAP_${mName}_${yr}.docx`; a.click();
  URL.revokeObjectURL(url);
}

const now = new Date();
document.getElementById('month').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
renderTable();
</script>
</body>
</html>
